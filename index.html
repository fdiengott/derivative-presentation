<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Derivatives — a tool for moving risk</title>

    <!-- reveal.js core + base theme (overridden by our stylesheets) -->
    <link rel="stylesheet" href="vendor/reveal/dist/reset.css" />
    <link rel="stylesheet" href="vendor/reveal/dist/reveal.css" />
    <link rel="stylesheet" href="vendor/reveal/dist/theme/white.css" id="theme" />

    <!-- our styles: base theme, then the SVG visual system -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/viz.css" />
  </head>

  <body>
    <div class="reveal">
      <!-- Each slide is its own file under slides/, pulled in by includes.js
           before Reveal initializes. Add a slide by adding a data-include. -->
      <div class="slides">
        <!-- Movement 1 — The Ache -->
        <div data-include="slides/title.html"></div>
        <div data-include="slides/ache.html"></div>
        <div data-include="slides/history.html"></div>
        <div data-include="slides/thesis.html"></div>

        <!-- Movement 2 — The Farmer's Staircase -->
        <div data-include="slides/forward.html"></div>
        <div data-include="slides/forward-worlds.html"></div>
        <div data-include="slides/future.html"></div>
        <div data-include="slides/option.html"></div>
        <div data-include="slides/option-worlds.html"></div>

        <!-- The Bridge — one moment → a recurring stream -->
        <div data-include="slides/bridge.html"></div>

        <!-- Movement 3 — Streams of Risk -->
        <div data-include="slides/swap.html"></div>
        <div data-include="slides/swap-dealer.html"></div>
        <div data-include="slides/cds.html"></div>

        <!-- Movement 4 — Synthesis -->
        <div data-include="slides/synthesis.html"></div>
        <div data-include="slides/close.html"></div>

        <!-- Thank you -->
        <div data-include="slides/thanks.html"></div>
      </div>
    </div>

    <!-- vendored reveal.js + notes plugin (UMD globals: Reveal, RevealNotes) -->
    <script src="vendor/reveal/dist/reveal.js"></script>
    <script src="vendor/reveal/dist/plugin/notes.js"></script>

    <!-- our helpers, then the orchestrator (must load last) -->
    <script src="js/includes.js"></script>
    <script src="js/anim.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
